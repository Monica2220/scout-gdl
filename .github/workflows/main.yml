name: Scout GDL - Scouting diario 7am

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scout:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependencias
        run: pip install -r scout-gdl/requirements.txt

      - name: Crear directorios
        run: mkdir -p scout-gdl/output scout-gdl/logs

      - name: Ejecutar agente de scouting
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          NEWSAPI_KEY:          ${{ secrets.NEWSAPI_KEY }}
          GOOGLE_PLACES_KEY:    ${{ secrets.GOOGLE_PLACES_KEY }}
          APOLLO_API_KEY:       ${{ secrets.APOLLO_API_KEY }}
          TWILIO_ACCOUNT_SID:   ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:    ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_FROM: ${{ secrets.TWILIO_WHATSAPP_FROM }}
          TU_WHATSAPP:          ${{ secrets.TU_WHATSAPP }}
          RESEND_API_KEY:       ${{ secrets.RESEND_API_KEY }}
          EMAIL_REMITENTE:      ${{ secrets.EMAIL_REMITENTE }}
          EMAIL_DESTINO:        ${{ secrets.EMAIL_DESTINO }}
        run: cd scout-gdl && python -c "from src.agent import run; run()"

      - name: Publicar dashboard en GitHub Pages
        run: |
          git config user.name "Scout GDL Bot"
          git config user.email "actions@github.com"
          cp scout-gdl/output/index.html index.html
          git add index.html
          git commit -m "Dashboard actualizado - $(date +%Y-%m-%d)" || echo "Sin cambios"
          git push

      - name: Subir CSV como artefacto
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scouting-gdl-${{ github.run_id }}
          path: scout-gdl/output/
          retention-days: 30
